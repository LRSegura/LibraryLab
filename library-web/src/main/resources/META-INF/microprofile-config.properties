# =============================================================================
# MicroProfile Config - Library Application
# =============================================================================
# This file provides the default configuration values for the library system.
#
# MicroProfile Config sources (by priority/ordinal):
#   1. System properties         (ordinal 400) - e.g. -Dlibrary.lending.default-loan-days=21
#   2. Environment variables     (ordinal 300) - e.g. LIBRARY_LENDING_DEFAULT_LOAN_DAYS=21
#   3. This properties file      (ordinal 100) - default values below
#
# To override in production without recompiling:
#   - Pass system properties to GlassFish JVM via domain.xml or asadmin
#   - Set environment variables in Docker/Kubernetes deployment
#
# For environment variables, replace dots with underscores and use uppercase:
#   library.lending.default-loan-days -> LIBRARY_LENDING_DEFAULT_LOAN_DAYS
# =============================================================================

# -----------------------------------------------------------------------------
# Lending Configuration
# -----------------------------------------------------------------------------

# Number of days for a standard loan period
library.lending.default-loan-days=14

# Maximum number of times a loan can be renewed
library.lending.max-renewals=2

# Number of days added when renewing a loan
library.lending.renewal-days=14

# -----------------------------------------------------------------------------
# Membership Configuration
# -----------------------------------------------------------------------------

# Default maximum concurrent loans allowed for new members
library.membership.default-max-loans=5

# Default membership duration in years for new registrations
library.membership.default-duration-years=1
